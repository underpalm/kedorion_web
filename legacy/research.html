<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OBNONE</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #ffffff;
      color: #111;
    }

    /* Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px 48px;
    }

    .brand {
      font-size: 14px;
      letter-spacing: 0.2em;
      color: #666;
    }

    nav {
      display: flex;
      gap: 32px;
      font-size: 14px;
    }

    nav a {
      text-decoration: none;
      color: #111;
    }

    /* Hero */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px 120px;
      text-align: center;
    }

    .diagram {
      margin: 40px auto 24px;
      max-width: 900px;
    }

    .diagram img {
      width: 100%;
      display: block;
    }

    .caption {
      font-size: 12px;
      color: #777;
      margin-bottom: 64px;
    }

    h1 {
      font-family: 'Source Serif 4', serif;
      font-size: 48px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .subtitle {
      font-size: 18px;
      color: #555;
      max-width: 640px;
      margin: 0 auto 40px;
      line-height: 1.5;
    }

    /* Buttons */
    .actions {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 22px;
      border-radius: 999px;
      font-size: 14px;
      text-decoration: none;
      border: 1px solid #ddd;
      color: #111;
      background: #f5f5f5;
    }

    .btn.secondary {
      background: transparent;
    }

    footer {
      text-align: center;
      padding: 60px 0 40px;
      font-size: 13px;
      color: #888;
    }
    .logo img {
      height: 22px;
      display: block;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
    <img src="openai.svg" alt="Kedorion Logo" />
  </div>
    <nav>
      <a href="#">Research</a>
      <a href="#">Blog</a>
      <a href="#">Join us</a>
    </nav>
  </header>

  <main>
    <div class="diagram">
      <!-- Platzhalter – ersetze durch dein echtes Bild -->
      <img src="IMG_0410.JPG" alt="TinkerToy Computer Diagram" />
    </div>

    <div class="caption">
      OBNONE Privacy by Design
    </div>

    <h1>OBNONE Privacy by Design</h1>

    <p class="subtitle">
      Control every aspect of model training and fine-tuning
      while we handle the infrastructure.
    </p>

    <div class="actions">
      <a href="index.html" class="btn secondary">← Back</a>
      <a href="#" class="btn">Join waitlist ↗</a>
    </div>
  </main>

  
  <footer>
  © 2025 All rights reserved
</footer>
</body>
</html>
