<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SENSE</title>

  <style>
    /* --- Schrift einbinden (KORRIGIERT mit Platzhaltern) --- */
    /* REGULAR (400) */
    @font-face {
      font-family: 'TeXGyreHeros';
      /* HIER MÜSSEN DIE EIGENEN DATEINAMEN EINGEFÜGT WERDEN */
      src: url('./fonts/custom-regular.otf') format('opentype'),
           url('./fonts/custom-regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    /* BOLD (700) */
    @font-face {
      font-family: 'TeXGyreHeros';
      /* HIER MÜSSEN DIE EIGENEN DATEINAMEN EINGEFÜGT WERDEN */
      src: url('./fonts/custom-bold.otf') format('opentype'),
           url('./fonts/custom-bold.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    /* --- Farben und globale Stile (KORRIGIERT) --- */
    :root{
      /* Verwendung der exakten Farbwerte aus dem Kommentar */
      --bg: #D3E2D8; /* Hauptrot */
      --accent: #000000; /* Gelb */
    }

    html,body{height:100%;}
    body{
      margin:0;
      /* Hintergrundfarbe */
      background:var(--bg);
      /* Schriftfarbe */
      color:var(--accent);
      font-family: 'TeXGyreHeros', Helvetica, Arial, sans-serif;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      overflow:hidden;
    }

    /* Container nimmt die ganze Seite ein */
    .page{
      position:relative;
      width:100vw;
      height:100vh;
    }

    /* kleine Elemente oben / unten */
    .top-left, .top-right, .top-center, .bottom-center{
      position:absolute;
      font-weight:700;
      letter-spacing:0.02em;
    }

    .top-left{ left:24px; top:14px; font-size:14px; }
    .top-center{ left:50%; transform:translateX(-50%); top:12px; font-size:28px; }
    .top-right{ right:22px; top:14px; text-align:right; font-size:12px; line-height:1.05; max-width:260px; }
    .bottom-center{ left:50%; transform:translateX(-50%); bottom:8px; font-size:12px; }

    /* Großer zentraler Titel */
    .hero{
      position:absolute;
      left:50%;
      /* leichte Verschiebung nach oben, damit es wie im Bild wirkt */
      top:44%;
      transform:translate(-50%,-50%);
      text-align:center;
      font-weight:700;
      white-space:nowrap;
      letter-spacing:0.02em;
      /* responsive Schriftgröße: passt sich an Viewport an */
      font-size:6.5vw; /* feintuning möglich */
    }

    /* kleinere Hilfstexte in der Mitte (falls benötigt) */
    .subtitle{
      display:block;
      font-size:1.2vw;
      margin-top:0.6rem;
      opacity:0.95;
      font-weight:700;
    }

    /* kleine Bildschirm-optimierungen */
    @media (max-width:800px){
      .hero{font-size:9.6vw; top:42%;}
      .top-center{font-size:18px}
      .top-left{font-size:12px}
    }

  </style>
</head>
<body>
  <div class="page">
    <div class="top-left">2021©</div>
    <div class="top-center"></div>

    <div class="top-right">
      Obnone™ c/o TEAM HUMANITY<br>
      Privacy by design. Where technology steps back, and humanity steps in.
    </div>


    <div class="hero">SENSE</div>

    <div class="bottom-center">© 2025 All rights reserved</div>
  </div>
</body>
</html>
